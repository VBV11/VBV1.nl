<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullscreen Image</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
    }

    .fullscreen-image {
      width: 100vw;
      height: 100vh;
      object-fit: fill; /* stretcht de afbeelding zodat hij het hele scherm vult */
      display: block;
    }
  </style>
</head>
<body>
  <img src="image.jpg" alt="Fullscreen afbeelding" class="fullscreen-image">
</body>
</html>
