<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tryhackme.com</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1f1f1f;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      color: #e8eaed;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 40px 40px;
      position: relative;
      min-height: 80vh;
    }

    .icon {
      width: 56px;
      height: 56px;
      margin-bottom: 40px;
      opacity: 0.8;
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      margin: 0 0 24px;
      color: #e8eaed;
    }

    .description {
      font-size: 15px;
      color: #bdc1c6;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .description strong {
      color: #e8eaed;
      font-weight: 600;
    }

    .error-code {
      font-size: 12px;
      color: #9aa0a6;
      letter-spacing: 0.5px;
    }

    .reload-btn {
      position: absolute;
      bottom: 40px;
      right: 40px;
      padding: 8px 22px;
      font-size: 14px;
      border-radius: 18px;
      cursor: pointer;
      font-family: inherit;
      background: #c9c3ff;
      color: #1a1a1a;
      border: none;
      font-weight: 500;
    }

    .reload-btn:hover {
      background: #b8b0ff;
    }

    .scare {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }

    .scare img {
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      display: block;
    }

    .scare.active {
      display: block;
      animation: flash 0.08s infinite, shake 0.05s infinite;
    }

    @keyframes flash {
      0%   { background-color: red;    filter: invert(0) hue-rotate(0deg)   contrast(1.5); }
      25%  { background-color: white;  filter: invert(1) hue-rotate(90deg)  contrast(2); }
      50%  { background-color: black;  filter: invert(0) hue-rotate(180deg) contrast(1.8); }
      75%  { background-color: red;    filter: invert(1) hue-rotate(270deg) contrast(2); }
      100% { background-color: white;  filter: invert(0) hue-rotate(360deg) contrast(1.5); }
    }

    @keyframes shake {
      0%   { transform: translate(0, 0) scale(1); }
      20%  { transform: translate(-15px, 8px) scale(1.05); }
      40%  { transform: translate(12px, -10px) scale(0.98); }
      60%  { transform: translate(-8px, -12px) scale(1.03); }
      80%  { transform: translate(10px, 6px) scale(1.01); }
      100% { transform: translate(0, 0) scale(1); }
    }
  </style>
</head>
<body>

  <div class="container" id="errorPage">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
      <path d="M10 6 L36 6 L46 16 L46 50 L10 50 Z" stroke="#9aa0a6" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <path d="M36 6 L36 16 L46 16" stroke="#9aa0a6" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <circle cx="22" cy="28" r="1.8" fill="#9aa0a6"/>
      <circle cx="34" cy="28" r="1.8" fill="#9aa0a6"/>
      <path d="M21 40 Q28 34 35 40" stroke="#9aa0a6" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <h1>This site can't be reached</h1>
    <p class="description">
      <strong>tryhackme.com</strong>'s DNS address could not be found. Diagnosing the problem.
    </p>
    <p class="error-code">DNS_PROBE_POSSIBLE</p>
    <button class="reload-btn" id="reloadBtn">Reload</button>
  </div>

  <div class="scare" id="scare">
    <img src="image.jpg" alt="">
  </div>

  <script>
    let armed = false;

    setTimeout(() => { armed = true; }, 1000);

    function onMouseMove() {
      if (armed) {
        document.removeEventListener('mousemove', onMouseMove);
        triggerScare();
      }
    }
    document.addEventListener('mousemove', onMouseMove);

    // ook reload knop triggert
    document.getElementById('reloadBtn').addEventListener('click', triggerScare);

    function triggerScare() {
      document.getElementById('errorPage').style.display = 'none';
      document.body.style.backgroundColor = 'black';
      document.getElementById('scare').classList.add('active');
      playScream();

      // fullscreen
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function playScream() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const duration = 4;
      const now = ctx.currentTime;

      const master = ctx.createGain();
      master.gain.setValueAtTime(2, now);
      master.gain.exponentialRampToValueAtTime(0.01, now + duration);
      master.connect(ctx.destination);

      const distortion = ctx.createWaveShaper();
      const curve = new Float32Array(44100);
      for (let i = 0; i < 44100; i++) {
        const x = (i * 2) / 44100 - 1;
        curve[i] = (Math.PI + 80) * x / (Math.PI + 80 * Math.abs(x));
      }
      distortion.curve = curve;
      distortion.oversample = '4x';
      distortion.connect(master);

      // hoofdgil
      const scream1 = ctx.createOscillator();
      scream1.type = 'sawtooth';
      scream1.frequency.setValueAtTime(1400, now);
      scream1.frequency.linearRampToValueAtTime(1900, now + 0.2);
      scream1.frequency.linearRampToValueAtTime(800, now + 1);
      scream1.frequency.linearRampToValueAtTime(1700, now + 1.8);
      scream1.frequency.linearRampToValueAtTime(600, now + 2.8);
      scream1.frequency.exponentialRampToValueAtTime(200, now + duration);

      const scream2 = ctx.createOscillator();
      scream2.type = 'square';
      scream2.frequency.setValueAtTime(700, now);
      scream2.frequency.linearRampToValueAtTime(950, now + 0.2);
      scream2.frequency.linearRampToValueAtTime(400, now + 1);
      scream2.frequency.linearRampToValueAtTime(850, now + 1.8);
      scream2.frequency.linearRampToValueAtTime(300, now + 2.8);
      scream2.frequency.exponentialRampToValueAtTime(100, now + duration);

      // lage growl voor diepte
      const growl = ctx.createOscillator();
      growl.type = 'sawtooth';
      growl.frequency.setValueAtTime(80, now);
      growl.frequency.linearRampToValueAtTime(60, now + duration);

      const growlGain = ctx.createGain();
      growlGain.gain.value = 0.6;
      growl.connect(growlGain);
      growlGain.connect(distortion);

      // vibrato
      const vibrato = ctx.createOscillator();
      vibrato.frequency.value = 20;
      const vibratoGain = ctx.createGain();
      vibratoGain.gain.value = 100;
      vibrato.connect(vibratoGain);
      vibratoGain.connect(scream1.frequency);
      vibratoGain.connect(scream2.frequency);

      // white noise
      const bufferSize = ctx.sampleRate * duration;
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.7;
      }
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;

      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 2000;
      noiseFilter.Q.value = 1;

      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.5;

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(distortion);

      scream1.connect(distortion);
      scream2.connect(distortion);

      scream1.start(now);
      scream2.start(now);
      vibrato.start(now);
      growl.start(now);
      noise.start(now);

      scream1.stop(now + duration);
      scream2.stop(now + duration);
      vibrato.stop(now + duration);
      growl.stop(now + duration);
      noise.stop(now + duration);
    }
  </script>
</body>
</html>
