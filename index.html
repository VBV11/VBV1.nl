<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verbinden...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #f5f5f5;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #333;
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    .url-bar {
      background: white;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 10px 20px;
      margin-bottom: 30px;
      font-size: 14px;
      color: #666;
      text-align: left;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .url-bar::before {
      content: "🔒 ";
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4285f4, #34a853);
      transition: width 0.1s ease;
    }

    .status {
      font-size: 13px;
      color: #888;
    }

    .scare {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }

    .scare img {
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      display: block;
    }

    .scare.active {
      display: block;
      animation: flash 0.08s infinite, shake 0.05s infinite;
    }

    @keyframes flash {
      0%   { background-color: red;    filter: invert(0) hue-rotate(0deg)   contrast(1.5); }
      25%  { background-color: white;  filter: invert(1) hue-rotate(90deg)  contrast(2); }
      50%  { background-color: black;  filter: invert(0) hue-rotate(180deg) contrast(1.8); }
      75%  { background-color: red;    filter: invert(1) hue-rotate(270deg) contrast(2); }
      100% { background-color: white;  filter: invert(0) hue-rotate(360deg) contrast(1.5); }
    }

    @keyframes shake {
      0%   { transform: translate(0, 0) scale(1); }
      20%  { transform: translate(-15px, 8px) scale(1.05); }
      40%  { transform: translate(12px, -10px) scale(0.98); }
      60%  { transform: translate(-8px, -12px) scale(1.03); }
      80%  { transform: translate(10px, 6px) scale(1.01); }
      100% { transform: translate(0, 0) scale(1); }
    }
  </style>
</head>
<body>

  <div class="loader" id="loader">
    <div class="url-bar">https://www.google.com</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    <div class="status" id="status">Verbinden met server...</div>
  </div>

  <div class="scare" id="scare">
    <img src="image.jpg" alt="">
  </div>

  <script>
    let p = 0;
    let loadingDone = false;
    const progress = document.getElementById('progress');
    const status = document.getElementById('status');

    const messages = [
      'Verbinden met server...',
      'DNS opzoeken...',
      'Beveiligde verbinding tot stand brengen...',
      'Inhoud ophalen...',
      'Wachten op www.google.com...'
    ];

    const interval = setInterval(() => {
      p += Math.random() * 15;
      if (p >= 100) {
        p = 100;
        progress.style.width = '100%';
        status.textContent = 'Bijna klaar... beweeg je muis om door te gaan';
        clearInterval(interval);
        loadingDone = true;
      } else {
        progress.style.width = p + '%';
        status.textContent = messages[Math.floor(p / 20)] || messages[0];
      }
    }, 80);

    // wacht op muisbeweging NA dat loading klaar is
    function onMouseMove() {
      if (loadingDone) {
        document.removeEventListener('mousemove', onMouseMove);
        triggerScare();
      }
    }
    document.addEventListener('mousemove', onMouseMove);

    function triggerScare() {
      document.getElementById('loader').style.display = 'none';
      document.body.style.backgroundColor = 'black';
      document.getElementById('scare').classList.add('active');
      playScream();

      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }

    // realistischere gil met meerdere lagen
    function playScream() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const duration = 4;
      const now = ctx.currentTime;

      // master gain voor volume
      const master = ctx.createGain();
      master.gain.setValueAtTime(1.5, now);
      master.gain.exponentialRampToValueAtTime(0.01, now + duration);
      master.connect(ctx.destination);

      // distortion voor schreeuw effect
      const distortion = ctx.createWaveShaper();
      const curve = new Float32Array(44100);
      for (let i = 0; i < 44100; i++) {
        const x = (i * 2) / 44100 - 1;
        curve[i] = (Math.PI + 50) * x / (Math.PI + 50 * Math.abs(x));
      }
      distortion.curve = curve;
      distortion.oversample = '4x';
      distortion.connect(master);

      // hoofdgil oscillator (hoog en kerend)
      const scream1 = ctx.createOscillator();
      scream1.type = 'sawtooth';
      scream1.frequency.setValueAtTime(1400, now);
      scream1.frequency.linearRampToValueAtTime(1800, now + 0.3);
      scream1.frequency.linearRampToValueAtTime(900, now + 1.2);
      scream1.frequency.linearRampToValueAtTime(1600, now + 2);
      scream1.frequency.exponentialRampToValueAtTime(300, now + duration);

      // tweede laag voor dikte
      const scream2 = ctx.createOscillator();
      scream2.type = 'square';
      scream2.frequency.setValueAtTime(700, now);
      scream2.frequency.linearRampToValueAtTime(900, now + 0.3);
      scream2.frequency.linearRampToValueAtTime(450, now + 1.2);
      scream2.frequency.linearRampToValueAtTime(800, now + 2);
      scream2.frequency.exponentialRampToValueAtTime(150, now + duration);

      // vibrato voor realisme (trillende stem)
      const vibrato = ctx.createOscillator();
      vibrato.frequency.value = 18;
      const vibratoGain = ctx.createGain();
      vibratoGain.gain.value = 80;
      vibrato.connect(vibratoGain);
      vibratoGain.connect(scream1.frequency);
      vibratoGain.connect(scream2.frequency);

      // white noise voor adem/ruis
      const bufferSize = ctx.sampleRate * duration;
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.6;
      }
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;

      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 2000;
      noiseFilter.Q.value = 1;

      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.4;

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(distortion);

      scream1.connect(distortion);
      scream2.connect(distortion);

      scream1.start(now);
      scream2.start(now);
      vibrato.start(now);
      noise.start(now);

      scream1.stop(now + duration);
      scream2.stop(now + duration);
      vibrato.stop(now + duration);
      noise.stop(now + duration);
    }
  </script>
</body>
</html>
