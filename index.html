<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>google.com</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #fff;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      color: #202124;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 100px 40px 40px;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin-bottom: 30px;
      opacity: 0.7;
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      margin: 0 0 16px;
      color: #202124;
    }

    .description {
      font-size: 15px;
      color: #5f6368;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .error-code {
      font-size: 12px;
      color: #5f6368;
      letter-spacing: 0.5px;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-primary {
      background: #1a73e8;
      color: white;
      border: 1px solid #1a73e8;
    }

    .btn-primary:hover {
      background: #1765cc;
    }

    .btn-secondary {
      background: white;
      color: #1a73e8;
      border: 1px solid #dadce0;
    }

    .btn-secondary:hover {
      background: #f8f9fa;
    }

    .scare {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }

    .scare img {
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      display: block;
    }

    .scare.active {
      display: block;
      animation: flash 0.08s infinite, shake 0.05s infinite;
    }

    @keyframes flash {
      0%   { background-color: red;    filter: invert(0) hue-rotate(0deg)   contrast(1.5); }
      25%  { background-color: white;  filter: invert(1) hue-rotate(90deg)  contrast(2); }
      50%  { background-color: black;  filter: invert(0) hue-rotate(180deg) contrast(1.8); }
      75%  { background-color: red;    filter: invert(1) hue-rotate(270deg) contrast(2); }
      100% { background-color: white;  filter: invert(0) hue-rotate(360deg) contrast(1.5); }
    }

    @keyframes shake {
      0%   { transform: translate(0, 0) scale(1); }
      20%  { transform: translate(-15px, 8px) scale(1.05); }
      40%  { transform: translate(12px, -10px) scale(0.98); }
      60%  { transform: translate(-8px, -12px) scale(1.03); }
      80%  { transform: translate(10px, 6px) scale(1.01); }
      100% { transform: translate(0, 0) scale(1); }
    }
  </style>
</head>
<body>

  <div class="container" id="errorPage">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="32" stroke="#5f6368" stroke-width="3" fill="none"/>
      <path d="M24 24 L48 48 M48 24 L24 48" stroke="#5f6368" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <h1>This site can't be reached</h1>
    <p class="description">
      <strong>google.com</strong>'s DNS address could not be found. Diagnosing the problem.
    </p>
    <p class="error-code">DNS_PROBE_POSSIBLE</p>
    <div class="buttons">
      <button class="btn btn-primary" id="reloadBtn">Reload</button>
      <button class="btn btn-secondary">Details</button>
    </div>
  </div>

  <div class="scare" id="scare">
    <img src="image.jpg" alt="">
  </div>

  <script>
    let armed = false;

    // wacht een seconde voor je arming activeert zodat de scare niet meteen triggert
    setTimeout(() => { armed = true; }, 1000);

    function onMouseMove() {
      if (armed) {
        document.removeEventListener('mousemove', onMouseMove);
        triggerScare();
      }
    }
    document.addEventListener('mousemove', onMouseMove);

    function triggerScare() {
      document.getElementById('errorPage').style.display = 'none';
      document.body.style.backgroundColor = 'black';
      document.getElementById('scare').classList.add('active');
      playScream();

      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }

    function playScream() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const duration = 4;
      const now = ctx.currentTime;

      const master = ctx.createGain();
      master.gain.setValueAtTime(1.5, now);
      master.gain.exponentialRampToValueAtTime(0.01, now + duration);
      master.connect(ctx.destination);

      const distortion = ctx.createWaveShaper();
      const curve = new Float32Array(44100);
      for (let i = 0; i < 44100; i++) {
        const x = (i * 2) / 44100 - 1;
        curve[i] = (Math.PI + 50) * x / (Math.PI + 50 * Math.abs(x));
      }
      distortion.curve = curve;
      distortion.oversample = '4x';
      distortion.connect(master);

      const scream1 = ctx.createOscillator();
      scream1.type = 'sawtooth';
      scream1.frequency.setValueAtTime(1400, now);
      scream1.frequency.linearRampToValueAtTime(1800, now + 0.3);
      scream1.frequency.linearRampToValueAtTime(900, now + 1.2);
      scream1.frequency.linearRampToValueAtTime(1600, now + 2);
      scream1.frequency.exponentialRampToValueAtTime(300, now + duration);

      const scream2 = ctx.createOscillator();
      scream2.type = 'square';
      scream2.frequency.setValueAtTime(700, now);
      scream2.frequency.linearRampToValueAtTime(900, now + 0.3);
      scream2.frequency.linearRampToValueAtTime(450, now + 1.2);
      scream2.frequency.linearRampToValueAtTime(800, now + 2);
      scream2.frequency.exponentialRampToValueAtTime(150, now + duration);

      const vibrato = ctx.createOscillator();
      vibrato.frequency.value = 18;
      const vibratoGain = ctx.createGain();
      vibratoGain.gain.value = 80;
      vibrato.connect(vibratoGain);
      vibratoGain.connect(scream1.frequency);
      vibratoGain.connect(scream2.frequency);

      const bufferSize = ctx.sampleRate * duration;
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.6;
      }
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;

      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 2000;
      noiseFilter.Q.value = 1;

      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.4;

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(distortion);

      scream1.connect(distortion);
      scream2.connect(distortion);

      scream1.start(now);
      scream2.start(now);
      vibrato.start(now);
      noise.start(now);

      scream1.stop(now + duration);
      scream2.stop(now + duration);
      vibrato.stop(now + duration);
      noise.stop(now + duration);
    }
  </script>
</body>
</html>
