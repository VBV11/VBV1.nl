<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>google.com</title>
<style>
body {
  --background-color: #fff;
  --error-code-color: rgb(95, 99, 104);
  --google-blue-300: rgb(138, 180, 248);
  --google-blue-600: rgb(26, 115, 232);
  --google-blue-700: rgb(25, 103, 210);
  --google-gray-500: rgb(154, 160, 166);
  --google-gray-700: rgb(95, 99, 104);
  --google-gray-900: rgb(32, 33, 36);
  --heading-color: var(--google-gray-900);
  --primary-button-fill-color-active: var(--google-blue-700);
  --primary-button-fill-color: var(--google-blue-600);
  --primary-button-text-color: #fff;
  --text-color: var(--google-gray-700);
  background: var(--background-color);
  color: var(--text-color);
  font-family: "sans", Arial, sans-serif;
  font-size: 75%;
  word-wrap: break-word;
  margin: 0;
}

html {
  -webkit-text-size-adjust: 100%;
  font-size: 125%;
}

@media (prefers-color-scheme: dark) {
  body {
    --background-color: var(--google-gray-900);
    --error-code-color: var(--google-gray-500);
    --heading-color: var(--google-gray-500);
    --primary-button-fill-color-active: rgb(129, 162, 208);
    --primary-button-fill-color: var(--google-blue-300);
    --primary-button-text-color: var(--google-gray-900);
    --text-color: var(--google-gray-500);
  }
  .icon { filter: invert(1); }
}

.interstitial-wrapper {
  box-sizing: border-box;
  font-size: 1em;
  line-height: 1.6em;
  margin: 14vh auto 0;
  max-width: 600px;
  width: 100%;
}

.icon {
  background-repeat: no-repeat;
  background-size: 100%;
  height: 72px;
  margin: 0 0 40px;
  width: 72px;
  -webkit-user-select: none;
  display: inline-block;
}

.icon-generic {
  content: image-set(
    url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEgAAABIAQMAAABvIyEEAAAABlBMVEUAAABTU1OoaSf/AAAAAXRSTlMAQObYZgAAAENJREFUeF7tzbEJACEQRNGBLeAasBCza2lLEGx0CxFGG9hBMDDxRy/72O9FMnIFapGylsu1fgoBdkXfUHLrQgdfrlJN1BdYBjQQm3UAAAAASUVORK5CYII=) 1x,
    url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQAQMAAADdiHD7AAAABlBMVEUAAABTU1OoaSf/AAAAAXRSTlMAQObYZgAAAFJJREFUeF7t0cENgDAMQ9FwYgxG6WjpaIzCCAxQxVggFuDiCvlLOeRdHR9yzjncHVoq3npu+wQUrUuJHylSTmBaespJyJQoObUeyxDQb3bEm5Au81c0pSCD8HYAAAAASUVORK5CYII=) 2x);
}

h1 {
  color: var(--heading-color);
  font-size: 1.6em;
  font-weight: normal;
  line-height: 1.25em;
  margin-bottom: 16px;
  margin-top: 0;
}

h1 span { font-weight: 500; }
#main-message > p { display: inline; }

.error-code {
  color: var(--error-code-color);
  font-size: .8em;
  margin-top: 12px;
  text-transform: uppercase;
}

button {
  background: var(--primary-button-fill-color);
  border: 0;
  border-radius: 20px;
  box-sizing: border-box;
  color: var(--primary-button-text-color);
  cursor: pointer;
  float: right;
  font-size: .875em;
  margin: 0;
  padding: 9px 16px;
  user-select: none;
}

button:hover, button:active {
  background: var(--primary-button-fill-color-active);
}

.nav-wrapper { margin-top: 51px; }
.nav-wrapper::after {
  clear: both;
  content: '';
  display: table;
  width: 100%;
}

.suggested-right > #control-buttons { float: right; }

@media (max-width: 700px) {
  .interstitial-wrapper { padding: 0 10%; }
}

.scare {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 9999;
}

.scare img {
  width: 100vw;
  height: 100vh;
  object-fit: fill;
  display: block;
}

.scare.active {
  display: block;
  animation: flash 0.08s infinite, shake 0.05s infinite;
}

@keyframes flash {
  0%   { background-color: red;    filter: invert(0) hue-rotate(0deg)   contrast(1.5); }
  25%  { background-color: white;  filter: invert(1) hue-rotate(90deg)  contrast(2); }
  50%  { background-color: black;  filter: invert(0) hue-rotate(180deg) contrast(1.8); }
  75%  { background-color: red;    filter: invert(1) hue-rotate(270deg) contrast(2); }
  100% { background-color: white;  filter: invert(0) hue-rotate(360deg) contrast(1.5); }
}

@keyframes shake {
  0%   { transform: translate(0, 0) scale(1); }
  20%  { transform: translate(-15px, 8px) scale(1.05); }
  40%  { transform: translate(12px, -10px) scale(0.98); }
  60%  { transform: translate(-8px, -12px) scale(1.03); }
  80%  { transform: translate(10px, 6px) scale(1.01); }
  100% { transform: translate(0, 0) scale(1); }
}
</style>
</head>
<body>
<div id="content">
  <div id="main-frame-error" class="interstitial-wrapper">
    <div id="main-content">
      <div class="icon icon-generic"></div>
      <div id="main-message">
        <h1><span>This site can't be reached</span></h1>
        <p><strong>google.com</strong>'s <abbr id="dnsDefinition">DNS address</abbr> could not be found. Diagnosing the problem.</p>
        <div class="error-code">DNS_PROBE_POSSIBLE</div>
      </div>
    </div>
    <div id="buttons" class="nav-wrapper suggested-right">
      <div id="control-buttons">
        <button id="reload-button">Reload</button>
      </div>
    </div>
  </div>
</div>

<div class="scare" id="scare">
  <img src="image.jpg" alt="">
</div>

<script>
let audioCtx = null;
let armed = false;

// Bij eerste user gesture (klik, toets, scroll, touch): fullscreen + audio warmup + start 3s timer
function armScare() {
  if (armed) return;
  armed = true;

  // verwijder alle listeners zodat het niet opnieuw triggert
  document.removeEventListener('click', armScare);
  document.removeEventListener('keydown', armScare);
  document.removeEventListener('touchstart', armScare);
  document.removeEventListener('scroll', armScare);
  document.removeEventListener('wheel', armScare);

  // 1. Fullscreen DIRECT activeren (binnen user gesture)
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();

  // 2. AudioContext aanmaken en resumen (binnen user gesture)
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  // 3. Start 3 seconden timer voor de scare
  setTimeout(triggerScare, 3000);
}

document.addEventListener('click', armScare);
document.addEventListener('keydown', armScare);
document.addEventListener('touchstart', armScare);
document.addEventListener('scroll', armScare);
document.addEventListener('wheel', armScare);

function triggerScare() {
  document.getElementById('content').style.display = 'none';
  document.body.style.backgroundColor = 'black';
  document.getElementById('scare').classList.add('active');
  playScream();
}

function playScream() {
  const ctx = audioCtx;
  const duration = 4;
  const now = ctx.currentTime;

  const master = ctx.createGain();
  master.gain.setValueAtTime(2, now);
  master.gain.exponentialRampToValueAtTime(0.01, now + duration);
  master.connect(ctx.destination);

  const distortion = ctx.createWaveShaper();
  const curve = new Float32Array(44100);
  for (let i = 0; i < 44100; i++) {
    const x = (i * 2) / 44100 - 1;
    curve[i] = (Math.PI + 80) * x / (Math.PI + 80 * Math.abs(x));
  }
  distortion.curve = curve;
  distortion.oversample = '4x';
  distortion.connect(master);

  const scream1 = ctx.createOscillator();
  scream1.type = 'sawtooth';
  scream1.frequency.setValueAtTime(1400, now);
  scream1.frequency.linearRampToValueAtTime(1900, now + 0.2);
  scream1.frequency.linearRampToValueAtTime(800, now + 1);
  scream1.frequency.linearRampToValueAtTime(1700, now + 1.8);
  scream1.frequency.linearRampToValueAtTime(600, now + 2.8);
  scream1.frequency.exponentialRampToValueAtTime(200, now + duration);

  const scream2 = ctx.createOscillator();
  scream2.type = 'square';
  scream2.frequency.setValueAtTime(700, now);
  scream2.frequency.linearRampToValueAtTime(950, now + 0.2);
  scream2.frequency.linearRampToValueAtTime(400, now + 1);
  scream2.frequency.linearRampToValueAtTime(850, now + 1.8);
  scream2.frequency.linearRampToValueAtTime(300, now + 2.8);
  scream2.frequency.exponentialRampToValueAtTime(100, now + duration);

  const growl = ctx.createOscillator();
  growl.type = 'sawtooth';
  growl.frequency.setValueAtTime(80, now);
  growl.frequency.linearRampToValueAtTime(60, now + duration);
  const growlGain = ctx.createGain();
  growlGain.gain.value = 0.6;
  growl.connect(growlGain);
  growlGain.connect(distortion);

  const vibrato = ctx.createOscillator();
  vibrato.frequency.value = 20;
  const vibratoGain = ctx.createGain();
  vibratoGain.gain.value = 100;
  vibrato.connect(vibratoGain);
  vibratoGain.connect(scream1.frequency);
  vibratoGain.connect(scream2.frequency);

  const bufferSize = ctx.sampleRate * duration;
  const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    output[i] = (Math.random() * 2 - 1) * 0.7;
  }
  const noise = ctx.createBufferSource();
  noise.buffer = noiseBuffer;
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 2000;
  noiseFilter.Q.value = 1;
  const noiseGain = ctx.createGain();
  noiseGain.gain.value = 0.5;
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(distortion);

  scream1.connect(distortion);
  scream2.connect(distortion);

  scream1.start(now);
  scream2.start(now);
  vibrato.start(now);
  growl.start(now);
  noise.start(now);

  scream1.stop(now + duration);
  scream2.stop(now + duration);
  vibrato.stop(now + duration);
  growl.stop(now + duration);
  noise.stop(now + duration);
}
</script>
</body>
</html>
