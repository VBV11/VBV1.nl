<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel of Names</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Boogaloo&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Fredoka One', cursive;
  background: #03030a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

#title {
  margin-top: 24px;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  letter-spacing: 3px;
  background: linear-gradient(90deg, #ff0080, #ffd700, #00f5ff, #ff0080);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 2.5s linear infinite;
  filter: drop-shadow(0 0 16px rgba(255,0,128,.5));
  position: relative; z-index: 2;
}
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:300%} }

#subtitle {
  font-family: 'Boogaloo', cursive;
  font-size: .95rem;
  letter-spacing: 8px;
  color: rgba(255,255,255,.4);
  margin-top: 4px;
  animation: subp 2s ease-in-out infinite;
  position: relative; z-index: 2;
}
@keyframes subp { 0%,100%{opacity:.3} 50%{opacity:.8} }

#wrapper {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  margin-top: 24px;
  padding: 0 20px 50px;
  position: relative; z-index: 2;
}

/* Wheel */
#wheel-outer {
  position: relative;
  border-radius: 50%;
}

#glow-ring {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #ff0080, #ffd700, #00f5ff, #a855f7, #ff0080);
  animation: ringspin 3s linear infinite;
  filter: blur(10px);
  opacity: .9;
}
#glow-ring2 {
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  background: conic-gradient(from 180deg, #00f5ff, #ff0080, #ffd700, #00f5ff);
  animation: ringspin 2s linear infinite reverse;
  filter: blur(5px);
  opacity: .6;
}
@keyframes ringspin { to { transform: rotate(360deg); } }

#wheel-canvas {
  display: block;
  border-radius: 50%;
  position: relative;
  z-index: 1;
}

.pointer {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  width: 0; height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-top: 55px solid #ff0080;
  filter: drop-shadow(0 0 12px #ff0080) drop-shadow(0 0 24px #ff0080);
  animation: ptrglow 1s ease-in-out infinite;
}
@keyframes ptrglow {
  0%,100% { filter: drop-shadow(0 0 10px #ff0080) drop-shadow(0 0 20px #ff0080); }
  50%      { filter: drop-shadow(0 0 20px #ff0080) drop-shadow(0 0 40px #ff0080); }
}

#wheel-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

#spinBtn {
  font-family: 'Fredoka One', cursive;
  font-size: 1.7rem;
  letter-spacing: 2px;
  padding: 16px 60px;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  background: linear-gradient(135deg, #ff0080, #ffd700, #00f5ff);
  background-size: 200% 200%;
  animation: btngrad 2s ease infinite;
  color: white;
  text-shadow: 0 2px 6px rgba(0,0,0,.5);
  box-shadow: 0 0 40px rgba(255,0,128,.7), 0 8px 32px rgba(0,0,0,.4);
  transition: transform .1s;
  position: relative;
  overflow: hidden;
}
#spinBtn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.3) 0%, transparent 55%);
  pointer-events: none;
}
#spinBtn:hover { transform: scale(1.05); }
#spinBtn:active { transform: scale(.97); }
#spinBtn:disabled { opacity: .35; cursor: not-allowed; animation: none; }
@keyframes btngrad { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

/* Controls */
.controls {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 255px;
}

.controls input {
  width: 100%;
  padding: 13px 16px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.06);
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: 17px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.controls input:focus {
  border-color: #00f5ff;
  box-shadow: 0 0 18px rgba(0,245,255,.3);
}
.controls input::placeholder { color: rgba(255,255,255,.3); }

#nameList {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.08);
  padding: 10px;
  border-radius: 14px;
  max-height: 300px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#nameList::-webkit-scrollbar { width: 4px; }
#nameList::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.name-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 15px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.07);
}
.name-item .x {
  background: rgba(255,60,60,.15);
  border: none;
  color: #ff5555;
  font-size: 13px;
  cursor: pointer;
  border-radius: 6px;
  padding: 3px 9px;
  transition: background .15s;
  font-family: monospace;
}
.name-item .x:hover { background: rgba(255,60,60,.35); }
.empty { text-align: center; color: rgba(255,255,255,.2); font-size: 13px; padding: 12px; font-family: 'Boogaloo', cursive; }

/* Modal */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
  backdrop-filter: blur(8px);
}
#modal-box {
  background: linear-gradient(145deg, #12122a, #0a0a1a);
  border: 2px solid rgba(255,215,0,.4);
  padding: 50px 40px 40px;
  border-radius: 24px;
  text-align: center;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 0 80px rgba(255,215,0,.3), 0 0 40px rgba(255,0,128,.2);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }

#modal-emoji { font-size: 3.5rem; display: block; margin-bottom: 10px; animation: bounce .6s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0) rotate(-5deg)} to{transform:translateY(-12px) rotate(5deg)} }

#modal-name {
  font-size: clamp(1.5rem, 5vw, 2.1rem);
  margin-bottom: 6px;
  background: linear-gradient(90deg, #ffd700, #ff0080);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#modal-sub { color: rgba(255,255,255,.45); font-family: 'Boogaloo', cursive; margin-bottom: 28px; }

#modal-btns { display: flex; gap: 12px; justify-content: center; }
#modal-btns button {
  padding: 13px 24px;
  border-radius: 12px;
  border: none;
  font-family: 'Fredoka One', cursive;
  font-size: 16px;
  cursor: pointer;
  transition: transform .1s, opacity .15s;
}
#modal-btns button:hover { opacity: .85; transform: scale(1.04); }
#btn-remove { background: linear-gradient(135deg, #ff0080, #ff4444); color: white; box-shadow: 0 0 20px rgba(255,0,128,.4); }
#btn-keep { background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); border: 1px solid rgba(255,255,255,.15); }

/* Confetti */
#confetti-canvas {
  position: fixed;
  inset: 0;
  z-index: 150;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div id="title">🎡 Wheel of Names</div>
<div id="subtitle">WHO WILL IT BE?</div>

<div id="wrapper">
  <div id="wheel-section">
    <div id="wheel-outer">
      <div id="glow-ring"></div>
      <div id="glow-ring2"></div>
      <div class="pointer"></div>
      <canvas id="wheel-canvas" width="480" height="480"></canvas>
    </div>
    <button id="spinBtn">🎰 SPIN!</button>
  </div>

  <div class="controls">
    <input id="nameInput" placeholder="Naam + Enter" autocomplete="off">
    <div id="nameList"></div>
  </div>
</div>

<div id="modal">
  <div id="modal-box">
    <span id="modal-emoji">🏆</span>
    <div id="modal-name"></div>
    <div id="modal-sub">is de winnaar!</div>
    <div id="modal-btns">
      <button id="btn-remove">❌ Verwijder</button>
      <button id="btn-keep">✅ Behoud</button>
    </div>
  </div>
</div>

<script>
// ── AUDIO ──────────────────────────────────────────────────────────────────────
var AC = null;
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}
function beep(freq, type, dur, vol, delay) {
  try {
    var c = ac(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, c.currentTime + (delay||0));
    o.frequency.exponentialRampToValueAtTime(freq * 0.4, c.currentTime + (delay||0) + dur);
    g.gain.setValueAtTime(vol || 0.3, c.currentTime + (delay||0));
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (delay||0) + dur);
    o.start(c.currentTime + (delay||0));
    o.stop(c.currentTime + (delay||0) + dur + 0.05);
  } catch(e) {}
}
function tick(progress) {
  beep(300 + (1 - progress) * 800, 'square', 0.03, 0.1);
}
function fanfare() {
  [523,659,784,1047].forEach(function(f,i){ beep(f,'sine',0.35,0.4,i*0.11); });
  setTimeout(function(){ [1047,1319,1568].forEach(function(f,i){ beep(f,'sine',0.4,0.5,i*0.09); }); }, 650);
}
document.addEventListener('click', function(){ try{ ac().resume(); }catch(e){} }, {once:true});

// ── CONFETTI ───────────────────────────────────────────────────────────────────
var cc = document.getElementById('confetti-canvas');
var cx = cc.getContext('2d');
var pieces = [];

function resizeCC() { cc.width = window.innerWidth; cc.height = window.innerHeight; }
resizeCC();
window.addEventListener('resize', resizeCC);

function launchConfetti() {
  for (var i = 0; i < 220; i++) {
    pieces.push({
      x: Math.random() * cc.width,
      y: -20 - Math.random() * 150,
      w: 8 + Math.random() * 10,
      h: 4 + Math.random() * 7,
      hue: Math.random() * 360,
      rot: Math.random() * 360,
      rotS: (Math.random() - 0.5) * 8,
      dx: (Math.random() - 0.5) * 4,
      dy: 3 + Math.random() * 4,
      gr: 0.12,
      al: 1
    });
  }
}

function drawConfetti() {
  cx.clearRect(0, 0, cc.width, cc.height);
  var alive = false;
  for (var i = pieces.length - 1; i >= 0; i--) {
    var p = pieces[i];
    p.dy += p.gr; p.x += p.dx; p.y += p.dy; p.rot += p.rotS;
    p.al -= 0.006;
    if (p.al <= 0) { pieces.splice(i, 1); continue; }
    alive = true;
    cx.save();
    cx.globalAlpha = p.al;
    cx.translate(p.x, p.y);
    cx.rotate(p.rot * Math.PI / 180);
    cx.fillStyle = 'hsl(' + p.hue + ',100%,60%)';
    cx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    cx.restore();
  }
  requestAnimationFrame(drawConfetti);
}
drawConfetti();

// ── WHEEL ──────────────────────────────────────────────────────────────────────
var canvas = document.getElementById('wheel-canvas');
var ctx = canvas.getContext('2d');
var R = canvas.width / 2;

var COLS = [
  '#FF0054','#FF6B00','#FFD700','#00E676','#00B8FF',
  '#D500F9','#FF4081','#00E5FF','#FF6D00','#E040FB',
  '#1DE9B6','#FF1744','#FFEA00','#00B0FF','#C6FF00',
  '#AA00FF','#FF6E40','#F50057','#00BFA5','#76FF03'
];

var entries = [];       // {display, rigged}
var rotation = 0;
var spinning = false;
var winner = null;

// Spin state
var spinStartTime = 0;
var spinDuration = 5500;
var spinFrom = 0;
var spinTo = 0;
var lastTickSeg = -1;

function getSpinnable() {
  return entries.filter(function(e){ return !e.rigged; });
}

function drawFrame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (entries.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.font = 'bold 18px Fredoka One, cursive';
    ctx.textAlign = 'center';
    ctx.fillText('Voeg namen toe! 👀', R, R + 7);
    return;
  }

  var n = entries.length;
  var slice = (2 * Math.PI) / n;

  ctx.save();
  ctx.translate(R, R);
  ctx.rotate(rotation);

  for (var i = 0; i < n; i++) {
    var s = i * slice;
    var col = COLS[i % COLS.length];

    // Segment
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R - 2, s, s + slice);
    ctx.fillStyle = col;
    ctx.fill();

    // Dark border
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R - 2, s, s + slice);
    ctx.strokeStyle = 'rgba(0,0,0,.2)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Shine
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R - 2, s, s + slice);
    ctx.clip();
    var grad = ctx.createRadialGradient(0,0,0,0,0,R);
    grad.addColorStop(0, 'rgba(255,255,255,.3)');
    grad.addColorStop(0.4, 'rgba(255,255,255,.06)');
    grad.addColorStop(1, 'rgba(0,0,0,.15)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Text
    ctx.save();
    ctx.rotate(s + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'white';
    ctx.shadowColor = 'rgba(0,0,0,.9)';
    ctx.shadowBlur = 6;
    var fs = Math.min(22, 270 / n);
    ctx.font = 'bold ' + fs + 'px Fredoka One, cursive';
    ctx.fillText(entries[i].display, R - 16, fs * 0.38);
    ctx.restore();
  }

  ctx.restore();

  // Outer ring
  ctx.beginPath();
  ctx.arc(R, R, R - 1, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,.15)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center hub
  var hg = ctx.createRadialGradient(R,R,0,R,R,48);
  hg.addColorStop(0, '#2a2a4a');
  hg.addColorStop(1, '#0d0d1a');
  ctx.beginPath();
  ctx.arc(R, R, 48, 0, Math.PI * 2);
  ctx.fillStyle = hg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.12)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.font = '24px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🎯', R, R + 8);
}

function easeOut(t) {
  return 1 - Math.pow(1 - t, 4);
}

function getCurrentSeg() {
  var n = entries.length;
  if (n === 0) return -1;
  var slice = (2 * Math.PI) / n;
  var angle = ((3 * Math.PI / 2 - rotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(angle / slice) % n;
}

function loop(ts) {
  if (spinning) {
    var elapsed = ts - spinStartTime;
    var progress = Math.min(elapsed / spinDuration, 1);
    rotation = spinFrom + (spinTo - spinFrom) * easeOut(progress);

    // Tick on segment change
    var seg = getCurrentSeg();
    if (seg !== lastTickSeg) {
      lastTickSeg = seg;
      if (progress < 0.98) tick(progress);
    }

    if (progress >= 1) {
      spinning = false;
      rotation = spinTo % (2 * Math.PI);
      setTimeout(function() {
        launchConfetti();
        fanfare();
        showModal();
        document.getElementById('spinBtn').disabled = false;
      }, 200);
    }
  }

  drawFrame();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── SPIN LOGIC ─────────────────────────────────────────────────────────────────
document.getElementById('spinBtn').onclick = function() {
  if (spinning) return;
  var eligible = getSpinnable();
  if (eligible.length === 0) return;

  beep(200, 'sawtooth', 0.4, 0.25);

  var n = entries.length;
  var slice = (2 * Math.PI) / n;

  // Pick random non-rigged winner
  var pick = eligible[Math.floor(Math.random() * eligible.length)];
  var idx = entries.indexOf(pick);

  // Midpoint of that segment, plus small random offset within it
  var segMid = idx * slice + slice / 2;
  var jitter = (Math.random() - 0.5) * slice * 0.55;

  // We want: rotation + segMid + jitter ≡ 3π/2  (pointer at top)
  var target = (3 * Math.PI / 2) - segMid - jitter;
  target = ((target % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

  var extraSpins = (7 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
  spinFrom = rotation;
  spinTo = target + extraSpins;

  // Ensure we always spin forward
  while (spinTo - spinFrom < 4 * Math.PI) spinTo += 2 * Math.PI;

  winner = pick;
  lastTickSeg = -1;
  spinStartTime = performance.now();
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
};

// ── MODAL ──────────────────────────────────────────────────────────────────────
function showModal() {
  document.getElementById('modal-name').textContent = winner.display;
  document.getElementById('modal').style.display = 'flex';
}

document.getElementById('btn-keep').onclick = function() {
  document.getElementById('modal').style.display = 'none';
};

document.getElementById('btn-remove').onclick = function() {
  var d = winner.display;
  entries = entries.filter(function(e){ return e.display !== d; });
  updateList();
  document.getElementById('modal').style.display = 'none';
};

// ── NAME LIST ──────────────────────────────────────────────────────────────────
function updateList() {
  var list = document.getElementById('nameList');
  list.innerHTML = '';
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty">Nog geen namen 👀</div>';
    document.getElementById('spinBtn').disabled = true;
    return;
  }
  entries.forEach(function(entry, idx) {
    var div = document.createElement('div');
    div.className = 'name-item';

    var sp = document.createElement('span');
    sp.textContent = entry.display;

    var btn = document.createElement('button');
    btn.className = 'x';
    btn.textContent = '✕';
    btn.setAttribute('data-idx', idx);
    btn.onclick = function() {
      var i = parseInt(this.getAttribute('data-idx'));
      entries.splice(i, 1);
      updateList();
    };

    div.appendChild(sp);
    div.appendChild(btn);
    list.appendChild(div);
  });

  var hasNonRigged = getSpinnable().length > 0;
  document.getElementById('spinBtn').disabled = !hasNonRigged;
}

document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var raw = e.target.value.trim();
  if (!raw) return;
  var rigged = raw[0] === ',';
  var display = rigged ? raw.slice(1).trim() : raw;
  if (!display) { e.target.value = ''; return; }
  var dup = entries.some(function(x){ return x.display === display; });
  if (!dup) {
    entries.push({ display: display, rigged: rigged });
    updateList();
    beep(600, 'sine', 0.1, 0.15);
  }
  e.target.value = '';
});

updateList();
</script>
</body>
</html>
