<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Chrome</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #202124;
    }

    /* nep chrome pagina */

    .browser {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .topbar {
      height: 80px;
      background: #202124;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab {
      width: 220px;
      height: 32px;
      background: #2d2e31;
      border-radius: 10px 10px 0 0;
    }

    .addressbar {
      height: 38px;
      background: #303134;
      border-radius: 30px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      color: #aaa;
      font-size: 14px;
    }

    .content {
      flex: 1;
      background: white;
      position: relative;
      overflow: hidden;
    }

    .loading-page {
      position: absolute;
      inset: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .chrome-logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background:
        conic-gradient(
          #ea4335 0deg 120deg,
          #fbbc05 120deg 240deg,
          #34a853 240deg 360deg
        );
      position: relative;
      animation: spin 1.5s linear infinite;
    }

    .chrome-logo::after {
      content: "";
      position: absolute;
      inset: 22px;
      background: #4285f4;
      border-radius: 50%;
      border: 8px solid white;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      margin-top: 25px;
      color: #555;
      font-size: 18px;
    }

    .hint {
      margin-top: 12px;
      color: #999;
      opacity: 0;
      transition: opacity 0.5s;
      font-size: 14px;
    }

    .hint.show {
      opacity: 1;
    }

    /* jumpscare */

    .scare {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999999;
      overflow: hidden;
      background: black;
    }

    .scare.active {
      display: block;
      animation: flash 0.08s infinite, shake 0.05s infinite;
    }

    .scare img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes flash {
      0% {
        filter: invert(0) contrast(1.5);
      }

      25% {
        filter: invert(1) contrast(2);
      }

      50% {
        filter: hue-rotate(90deg) contrast(2);
      }

      75% {
        filter: hue-rotate(180deg) invert(1);
      }

      100% {
        filter: invert(0);
      }
    }

    @keyframes shake {
      0% { transform: translate(0px, 0px); }
      20% { transform: translate(-15px, 10px); }
      40% { transform: translate(12px, -12px); }
      60% { transform: translate(-8px, -15px); }
      80% { transform: translate(10px, 8px); }
      100% { transform: translate(0px, 0px); }
    }
  </style>
</head>

<body>

  <div class="browser">

    <div class="topbar">

      <div class="tabs">
        <div class="tab"></div>
      </div>

      <div class="addressbar">
        https://www.google.com
      </div>

    </div>

    <div class="content">

      <div class="loading-page">

        <div class="chrome-logo"></div>

        <div class="loading-text">
          Website laden...
        </div>

        <div class="hint" id="hint">
          Beweeg je muis om door te gaan...
        </div>

      </div>

    </div>

  </div>

  <!-- jumpscare -->
  <div class="scare" id="scare">
    <img src="image.jpg" alt="">
  </div>

  <script>

    const hint = document.getElementById("hint");

    let ready = false;
    let triggered = false;

    // nep laadtijd
    setTimeout(() => {

      ready = true;

      hint.classList.add("show");

    }, 3500);

    let lastX = null;
    let lastY = null;

    document.addEventListener("mousemove", (e) => {

      if (!ready || triggered) return;

      if (lastX === null) {
        lastX = e.clientX;
        lastY = e.clientY;
        return;
      }

      const dx = Math.abs(e.clientX - lastX);
      const dy = Math.abs(e.clientY - lastY);

      // pas triggeren bij echte beweging
      if (dx > 25 || dy > 25) {

        triggered = true;

        setTimeout(() => {
          triggerScare();
        }, 300);
      }

      lastX = e.clientX;
      lastY = e.clientY;

    });

    function triggerScare() {

      document.getElementById("scare").classList.add("active");

      playScream();

      // fullscreen
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }

    // jumpscare geluid
    function playScream() {

      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      const duration = 4;

      const bufferSize = ctx.sampleRate * duration;

      const noiseBuffer = ctx.createBuffer(
        1,
        bufferSize,
        ctx.sampleRate
      );

      const output = noiseBuffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.8;
      }

      const noise = ctx.createBufferSource();

      noise.buffer = noiseBuffer;

      const filter = ctx.createBiquadFilter();

      filter.type = "bandpass";

      filter.frequency.value = 1000;

      const osc = ctx.createOscillator();

      osc.type = "sawtooth";

      osc.frequency.setValueAtTime(
        1000,
        ctx.currentTime
      );

      osc.frequency.exponentialRampToValueAtTime(
        120,
        ctx.currentTime + duration
      );

      const gain = ctx.createGain();

      gain.gain.setValueAtTime(
        1,
        ctx.currentTime
      );

      gain.gain.exponentialRampToValueAtTime(
        0.01,
        ctx.currentTime + duration
      );

      noise.connect(filter);

      filter.connect(gain);

      osc.connect(gain);

      gain.connect(ctx.destination);

      noise.start();

      osc.start();

      noise.stop(ctx.currentTime + duration);

      osc.stop(ctx.currentTime + duration);
    }

  </script>

</body>
</html>
