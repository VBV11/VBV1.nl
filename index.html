<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Officiële Mededeling</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 700px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 20px;
      opacity: 0.9;
    }

    .badge {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #22c55e;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Officiële Verklaring</h1>
    <p>Na uitgebreid onderzoek en overleg is vastgesteld dat:</p>
    <h1>Stan is een drempel.</h1>
    <div class="badge">Officieel bevestigd</div>
  </div>
</body>
</html>
